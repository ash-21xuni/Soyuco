<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soyuco — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0e0d0b 0%, #1a1814 100%);
            font-family: 'Space Grotesk', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            max-width: 440px;
            width: 100%;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            color: #e8c68a;
            letter-spacing: -0.02em;
        }

        .logo p {
            color: #a09880;
            font-size: 0.85rem;
            margin-top: 8px;
        }

        .card {
            background: rgba(22, 21, 18, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid #3a3628;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            border-bottom: 1px solid #3a3628;
            padding-bottom: 12px;
        }

        .tab {
            background: none;
            border: none;
            color: #6b6454;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 8px 16px;
            transition: all 0.2s;
            border-radius: 8px;
        }

        .tab.active {
            color: #e8c68a;
            background: rgba(200, 169, 110, 0.1);
        }

        .tab:hover {
            color: #f0ead6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #a09880;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        input {
            width: 100%;
            padding: 12px 14px;
            background: #0e0d0b;
            border: 1px solid #3a3628;
            border-radius: 8px;
            color: #f0ead6;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        input:focus {
            outline: none;
            border-color: #c8a96e;
            box-shadow: 0 0 0 2px rgba(200, 169, 110, 0.2);
        }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #c8a96e;
            border: none;
            border-radius: 8px;
            color: #0e0d0b;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }

        button[type="submit"]:hover {
            background: #e8c68a;
            transform: translateY(-1px);
        }

        .error-message {
            background: rgba(200, 110, 110, 0.1);
            border: 1px solid #c86e6e;
            border-radius: 8px;
            padding: 10px;
            margin-top: 16px;
            color: #c86e6e;
            font-size: 0.8rem;
            text-align: center;
            display: none;
        }

        .success-message {
            background: rgba(110, 200, 126, 0.1);
            border: 1px solid #6ec87e;
            border-radius: 8px;
            padding: 10px;
            margin-top: 16px;
            color: #6ec87e;
            font-size: 0.8rem;
            text-align: center;
            display: none;
        }

        .form-hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>✦ Soyuco</h1>
            <p>Your journal, everywhere you go</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign In</button>
                <button class="tab" onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button type="submit" onclick="handleLogin()">Sign In →</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="form-hidden">
                <div class="form-group">
                    <label>Display Name</label>
                    <input type="text" id="signupName" placeholder="How should we call you?">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="signupEmail" placeholder="you@example.com">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="signupPassword" placeholder="at least 6 characters">
                </div>
                <button type="submit" onclick="handleSignup()">Create Account →</button>
            </div>

            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        const SUPABASE_URL = 'https://wrblwwxtucocqibunxla.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyYmx3d3h0dWNvY3FpYnVueGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzA1NTUsImV4cCI6MjA5NTkwNjU1NX0.919L8G5IDyvyvcrum0HN9RnlF-Gmwc7VsOtkVGEV4JM'

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        window.switchTab = function(tab) {
            const loginForm = document.getElementById('loginForm')
            const signupForm = document.getElementById('signupForm')
            const tabs = document.querySelectorAll('.tab')
            
            if (tab === 'login') {
                loginForm.classList.remove('form-hidden')
                signupForm.classList.add('form-hidden')
                tabs[0].classList.add('active')
                tabs[1].classList.remove('active')
            } else {
                loginForm.classList.add('form-hidden')
                signupForm.classList.remove('form-hidden')
                tabs[0].classList.remove('active')
                tabs[1].classList.add('active')
            }
            
            document.getElementById('errorMessage').style.display = 'none'
            document.getElementById('successMessage').style.display = 'none'
        }

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value
            const password = document.getElementById('loginPassword').value
            const errorDiv = document.getElementById('errorMessage')
            const successDiv = document.getElementById('successMessage')
            
            errorDiv.style.display = 'none'
            successDiv.style.display = 'none'
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password'
                errorDiv.style.display = 'block'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email, password
                })
                
                if (error) throw error
                
                // Save session to localStorage
                localStorage.setItem('soyuco_session', JSON.stringify(data.session))
                
                successDiv.textContent = 'Sign in successful! Redirecting...'
                successDiv.style.display = 'block'
                
                // Redirect to main app
                setTimeout(() => {
                    window.location.href = 'index.html'
                }, 1000)
                
            } catch (error) {
                errorDiv.textContent = error.message
                errorDiv.style.display = 'block'
            }
        }
        
        window.handleSignup = async function() {
            const name = document.getElementById('signupName').value
            const email = document.getElementById('signupEmail').value
            const password = document.getElementById('signupPassword').value
            const errorDiv = document.getElementById('errorMessage')
            const successDiv = document.getElementById('successMessage')
            
            errorDiv.style.display = 'none'
            successDiv.style.display = 'none'
            
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields'
                errorDiv.style.display = 'block'
                return
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters'
                errorDiv.style.display = 'block'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { display_name: name } }
                })
                
                if (error) throw error
                
                successDiv.textContent = 'Account created! Please check your email to confirm, then sign in.'
                successDiv.style.display = 'block'
                
                // Clear form
                document.getElementById('signupName').value = ''
                document.getElementById('signupEmail').value = ''
                document.getElementById('signupPassword').value = ''
                
                // Switch to login tab after 2 seconds
                setTimeout(() => {
                    window.switchTab('login')
                }, 2000)
                
            } catch (error) {
                errorDiv.textContent = error.message
                errorDiv.style.display = 'block'
            }
        }
        
        // Check if already logged in
        const savedSession = localStorage.getItem('soyuco_session')
        if (savedSession) {
            const session = JSON.parse(savedSession)
            if (session.expires_at > Date.now() / 1000) {
                window.location.href = 'index.html'
            }
        }
    </script>
</body>
</html>
