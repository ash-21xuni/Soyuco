<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soyuco — Sign In</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="themes.css">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-logo">
            <a href="index.html">
                <div class="login-logo-img">
                    <img src="logo.svg" alt="Soyuco Logo">
                </div>
                <div>
                    <h1>Soyuco</h1>
                    <p>Your journal, everywhere you go</p>
                </div>
            </a>
        </div>

        <div class="login-card">
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchTab('login')">Sign In</button>
                <button class="login-tab" onclick="switchTab('signup')">Create Account</button>
            </div>

            <!-- Login Form -->
            <div id="loginForm">
                <div class="login-form-group">
                    <label class="login-label">Email</label>
                    <input class="login-input" type="email" id="loginEmail" placeholder="you@example.com">
                </div>
                <div class="login-form-group">
                    <label class="login-label">Password</label>
                    <input class="login-input" type="password" id="loginPassword" placeholder="••••••••">
                </div>
                <button class="login-btn-primary" onclick="handleLogin()">Sign In →</button>
            </div>

            <!-- Signup Form -->
            <div id="signupForm" class="form-hidden">
                <div class="login-form-group">
                    <label class="login-label">Display Name</label>
                    <input class="login-input" type="text" id="signupName" placeholder="How should we call you?">
                </div>
                <div class="login-form-group">
                    <label class="login-label">Email</label>
                    <input class="login-input" type="email" id="signupEmail" placeholder="you@example.com">
                </div>
                <div class="login-form-group">
                    <label class="login-label">Password</label>
                    <input class="login-input" type="password" id="signupPassword" placeholder="at least 6 characters">
                </div>
                <button class="login-btn-primary" onclick="handleSignup()">Create Account →</button>
            </div>

            <div id="errorMessage" class="login-error"></div>
            <div id="successMessage" class="login-success"></div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

        const SUPABASE_URL = 'https://wrblwwxtucocqibunxla.supabase.co'
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndyYmx3d3h0dWNvY3FpYnVueGxhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAzMzA1NTUsImV4cCI6MjA5NTkwNjU1NX0.919L8G5IDyvyvcrum0HN9RnlF-Gmwc7VsOtkVGEV4JM'

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY)

        window.switchTab = function(tab) {
            const loginForm = document.getElementById('loginForm')
            const signupForm = document.getElementById('signupForm')
            const tabs = document.querySelectorAll('.login-tab')
            
            if (tab === 'login') {
                loginForm.classList.remove('form-hidden')
                signupForm.classList.add('form-hidden')
                tabs[0].classList.add('active')
                tabs[1].classList.remove('active')
            } else {
                loginForm.classList.add('form-hidden')
                signupForm.classList.remove('form-hidden')
                tabs[0].classList.remove('active')
                tabs[1].classList.add('active')
            }
            
            document.getElementById('errorMessage').style.display = 'none'
            document.getElementById('successMessage').style.display = 'none'
        }

        window.handleLogin = async function() {
            const email = document.getElementById('loginEmail').value
            const password = document.getElementById('loginPassword').value
            const errorDiv = document.getElementById('errorMessage')
            const successDiv = document.getElementById('successMessage')
            
            errorDiv.style.display = 'none'
            successDiv.style.display = 'none'
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password'
                errorDiv.style.display = 'block'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signInWithPassword({
                    email, password
                })
                
                if (error) throw error
                
                localStorage.setItem('soyuco_session', JSON.stringify(data.session))
                
                successDiv.textContent = 'Sign in successful! Redirecting...'
                successDiv.style.display = 'block'
                
                setTimeout(() => {
                    window.location.href = 'journal.html'
                }, 1000)
                
            } catch (error) {
                errorDiv.textContent = error.message
                errorDiv.style.display = 'block'
            }
        }
        
        window.handleSignup = async function() {
            const name = document.getElementById('signupName').value
            const email = document.getElementById('signupEmail').value
            const password = document.getElementById('signupPassword').value
            const errorDiv = document.getElementById('errorMessage')
            const successDiv = document.getElementById('successMessage')
            
            errorDiv.style.display = 'none'
            successDiv.style.display = 'none'
            
            if (!name || !email || !password) {
                errorDiv.textContent = 'Please fill in all fields'
                errorDiv.style.display = 'block'
                return
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'Password must be at least 6 characters'
                errorDiv.style.display = 'block'
                return
            }
            
            try {
                const { data, error } = await supabase.auth.signUp({
                    email, password,
                    options: { data: { display_name: name } }
                })
                
                if (error) throw error
                
                successDiv.textContent = 'Account created! Please check your email to confirm, then sign in.'
                successDiv.style.display = 'block'
                
                document.getElementById('signupName').value = ''
                document.getElementById('signupEmail').value = ''
                document.getElementById('signupPassword').value = ''
                
                setTimeout(() => {
                    window.switchTab('login')
                }, 2000)
                
            } catch (error) {
                errorDiv.textContent = error.message
                errorDiv.style.display = 'block'
            }
        }
        
        const savedSession = localStorage.getItem('soyuco_session')
        if (savedSession) {
            const session = JSON.parse(savedSession)
            if (session.expires_at > Date.now() / 1000) {
                window.location.href = 'journal.html'
            }
        }
    </script>
</body>
</html>
